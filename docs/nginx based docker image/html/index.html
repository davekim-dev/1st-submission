<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Custom NGINX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }
 
    .container {
      text-align: center;
      padding: 3rem;
      border: 1px solid #333;
      background: #1a1a1a;
      max-width: 520px;
      width: 90%;
    }
 
    .badge {
      display: inline-block;
      background: #009900;
      color: #fff;
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }
 
    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      color: #ffffff;
    }
 
    h1 span {
      color: #009900;
    }
 
    p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
 
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #333;
      border: 1px solid #333;
      margin-bottom: 2rem;
    }
 
    .info-item {
      background: #1a1a1a;
      padding: 1rem;
      text-align: left;
    }
 
    .info-label {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
 
    .info-value {
      font-size: 0.9rem;
      color: #ccc;
    }
 
    .footer {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">✓ Running</div>
    <h1>My Custom <span>NGINX</span></h1>
    <p>커스텀 Docker 이미지로 빌드된<br/>NGINX 웹 서버가 정상 작동 중입니다.</p>
 
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Base Image</div>
        <div class="info-value">nginx:alpine</div>
      </div>
      <div class="info-item">
        <div class="info-label">Server</div>
        <div class="info-value">NGINX</div>
      </div>
      <div class="info-item">
        <div class="info-label">Port</div>
        <div class="info-value">80</div>
      </div>
      <div class="info-item">
        <div class="info-label">Content</div>
        <div class="info-value">Custom HTML</div>
      </div>
    </div>
 
    <div class="footer">Dockerfile 실습 — Custom Image Build</div>
  </div>
</body>
</html>
